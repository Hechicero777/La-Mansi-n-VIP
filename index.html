<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votación Triax</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0d1117; 
            color: #e6edf3; 
            margin: 0; 
            padding: 15px; 
        }

        /* Contenedor de Slots en 2 columnas */
        .grid-votacion {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        /* Estilo de cada Cuadro/Slot */
        .slot {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .slot:active {
            transform: scale(0.98);
        }

        /* Foto del participante */
        .slot img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #000;
            border: 1px solid #30363d;
        }

        .nombre {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin: 10px 0 5px;
            color: #58a6ff;
            height: 20px;
            overflow: hidden;
        }

        /* El Contador solicitado */
        .contador {
            display: block;
            font-size: 24px;
            font-weight: 800;
            color: #3fb950; /* Verde brillante */
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(63, 185, 80, 0.3);
        }

        /* Botón de acción */
        .btn-votar {
            background-color: #238636;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-votar:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="grid-votacion" id="contenedor">
        </div>

    <script>
        const CONFIG = {
            // Token fragmentado para evitar bloqueo de GitHub
            token: ["ghp_", "bO4pJCLPCPNZUht90vXneD9brtjgDy0JqD5w"].join(""),
            owner: "Hechicero777",
            repo: "La-Mansi-n-VIP",
            path: "votos.json",
            adId: "ca-app-pub-7344656090124182/7924570169"
        };

        async function actualizarPantalla() {
            try {
                const t = new Date().getTime();
                const r = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${t}`, {
                    headers: { 'Authorization': `token ${CONFIG.token}` }
                });
                
                const data = await r.json();
                const lista = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                const contenedor = document.getElementById('contenedor');
                contenedor.innerHTML = "";
                
                lista.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="slot">
                            <img src="https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/fotos/${p.id}.jpg" onerror="this.src='https://via.placeholder.com/150/000/fff?text=TRI-AX'">
                            <span class="nombre">${p.personaje}</span>
                            <span class="contador" id="count-${p.id}">${p.votos}</span>
                            <button class="btn-votar" onclick="procesarVoto(${p.id}, '${p.personaje}')">Votar +1</button>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('contenedor').innerHTML = "<p>Error de conexión con el Kernel.</p>";
            }
        }

        function procesarVoto(id, nombre) {
            if (typeof parent.showRewardedAd !== "undefined") {
                parent.showRewardedAd(CONFIG.adId);
                window.onRewardedAdCompleted = () => ejecutarSubida(id, nombre);
            } else {
                if(confirm("¿Votar por " + nombre + "? (Simulación fuera de App)")) {
                    ejecutarSubida(id, nombre);
                }
            }
        }

        async function ejecutarSubida(id, nombre) {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    headers: { 'Authorization': `token ${CONFIG.token}` }
                });
                const fileData = await res.json();
                let datos = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                datos = datos.map(p => p.id === id ? {...p, votos: p.votos + 1} : p);

                const update = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    method: "PUT",
                    headers: { 'Authorization': `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Voto para ${nombre}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(datos, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if(update.ok) {
                    actualizarPantalla();
                }
            } catch (err) {
                alert("Error al subir voto.");
            }
        }

        window.onload = actualizarPantalla;
    </script>

</body>
</html>
