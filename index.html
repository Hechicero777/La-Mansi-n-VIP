<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mansión VIP - Votación</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 10px; }
        .grid-votacion { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .tarjeta { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 8px; text-align: center; }
        .tarjeta img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; background: #333; }
        .nombre { display: block; font-size: 13px; margin: 5px 0; height: 32px; overflow: hidden; }
        .votos-num { display: block; font-size: 18px; color: #00ff00; font-weight: bold; margin-bottom: 5px; }
        .btn-votar { background: #d32f2f; color: #fff; border: none; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid-votacion" id="contenedor"></div>

    <script>
        const jsonUrl = "https://raw.githubusercontent.com/Hechicero777/La-Mansi-n-VIP/main/votos.json";

        async function cargarVotacion() {
            try {
                const respuesta = await fetch(jsonUrl);
                const personajes = await respuesta.json();
                const contenedor = document.getElementById('contenedor');
                
                contenedor.innerHTML = ""; // Limpiar
                
                personajes.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="tarjeta">
                            <img src="https://raw.githubusercontent.com/Hechicero777/La-Mansi-n-VIP/main/fotos/${p.id}.jpg" alt="${p.personaje}">
                            <span class="nombre">${p.personaje}</span>
                            <span class="votos-num" id="v-id-${p.id}">${p.votos}</span>
                            <button class="btn-votar" onclick="iniciarVoto(${p.id})">VOTAR</button>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error cargando votos"); }
        }

        function iniciarVoto(id) {
            // Aquí se activa el ID: ca-app-pub-7344656090124182/7924570169
            alert("Viendo anuncio para votar por el ID: " + id);
        }

        window.onload = cargarVotacion;
    </script>
</body>
</html>
