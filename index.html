<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mansión VIP - Triax System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 10px; }
        .grid-votacion { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .tarjeta { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 8px; text-align: center; }
        .tarjeta img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; background: #333; }
        .nombre { display: block; font-size: 13px; margin: 5px 0; height: 32px; overflow: hidden; font-weight: bold; }
        .votos-num { display: block; font-size: 18px; color: #00ff00; font-weight: bold; margin-bottom: 5px; }
        .btn-votar { background: #d32f2f; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid-votacion" id="contenedor"></div>

    <script>
        // CONFIGURACIÓN MAESTRA DE TRIAX
        const CONFIG = {
            // Dividimos el token para evitar el bloqueo de seguridad de GitHub
            token: ["ghp_", "bO4pJCLPCPNZUht90vXneD9brtjgDy0JqD5w"].join(""),
            owner: "Hechicero777",
            repo: "La-Mansi-n-VIP",
            path: "votos.json",
            adId: "ca-app-pub-7344656090124182/7924570169"
        };

        async function cargarVotacion() {
            try {
                const r = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    headers: { 'Authorization': `token ${CONFIG.token}`, 'Cache-Control': 'no-cache' }
                });
                const data = await r.json();
                // Decodificar el contenido de GitHub
                const personajes = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                const contenedor = document.getElementById('contenedor');
                contenedor.innerHTML = "";
                personajes.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="tarjeta">
                            <img src="https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/fotos/${p.id}.jpg" onerror="this.src='https://via.placeholder.com/150/333/fff?text=Triax+VIP'">
                            <span class="nombre">${p.personaje}</span>
                            <span class="votos-num" id="v-${p.id}">${p.votos}</span>
                            <button class="btn-votar" onclick="votar(${p.id}, '${p.personaje}')">VOTAR</button>
                        </div>`;
                });
            } catch (e) { 
                console.error("Error cargando votos:", e);
                document.getElementById('contenedor').innerHTML = "<p>Error al conectar con Triax System.</p>";
            }
        }

        function votar(id, nombre) {
            // Lógica para AppCreator24
            if (typeof parent.showRewardedAd !== "undefined") {
                parent.showRewardedAd(CONFIG.adId);
                window.onRewardedAdCompleted = function() {
                    registrarVoto(id, nombre);
                };
            } else {
                // Simulación para tus pruebas en navegador
                if(confirm("Simulación: ¿Ver anuncio para ganar 1 TriaxKoin para " + nombre + "?")) {
                    registrarVoto(id, nombre);
                }
            }
        }

        async function registrarVoto(id, nombre) {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    headers: { 'Authorization': `token ${CONFIG.token}` }
                });
                const fileData = await res.json();
                let personajes = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                personajes = personajes.map(p => p.id === id ? {...p, votos: p.votos + 1} : p);

                const updateRes = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    method: "PUT",
                    headers: { 
                        'Authorization': `token ${CONFIG.token}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        message: `Voto registrado para ${nombre} (TriaxKoin)`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(personajes, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if(updateRes.ok) {
                    alert("¡Voto registrado con éxito!");
                    cargarVotacion(); 
                }
            } catch (err) {
                alert("Error en la conexión Triax.");
            }
        }

        window.onload = cargarVotacion;
    </script>
</body>
</html>
